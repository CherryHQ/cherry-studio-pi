name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.9.7"
        required: true
        default: "v1.9.7"
        type: string
      confirm_tag:
        description: "Type the same release tag again to confirm"
        required: true
        default: ""
        type: string
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - mac
          - windows
          - linux
      draft:
        description: "Create or update the GitHub Release as a draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  actions: write
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release metadata
    if: github.repository == 'CherryHQ/cherry-studio-pi' && github.event_name == 'workflow_dispatch'
    # Releases are intentionally manual-only. Pushing a tag must not publish a
    # GitHub Release; this keeps version bumps and public releases as separate,
    # explicit actions. Keep the event guard above even if a future upstream
    # merge reintroduces a tag push trigger.
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      draft: ${{ steps.release.outputs.draft }}
      prerelease: ${{ steps.release.outputs.prerelease }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          CONFIRM_TAG="${{ github.event.inputs.confirm_tag }}"
          DRAFT="${{ inputs.draft }}"
          PRERELEASE="${{ inputs.prerelease }}"

          if [ "$CONFIRM_TAG" != "$TAG" ]; then
            echo "Release tag confirmation mismatch."
            echo "tag=$TAG"
            echo "confirm_tag=$CONFIRM_TAG"
            exit 1
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG"
            echo "Expected a tag like v1.9.7, v1.9.7-rc.1, or v1.9.7-beta.1"
            exit 1
          fi

          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="true"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        shell: bash
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          DEFAULT_BRANCH_NAME="${{ github.event.repository.default_branch }}"
          DEFAULT_BRANCH="origin/$DEFAULT_BRANCH_NAME"

          git fetch origin --tags --force
          if ! git rev-parse --verify "$DEFAULT_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$DEFAULT_BRANCH_NAME:refs/remotes/origin/$DEFAULT_BRANCH_NAME"
          fi

          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Release tag $TAG does not exist."
            echo "Create it with the guarded version helper first:"
            echo "  CHERRY_STUDIO_PI_RELEASE_CONFIRM=$TAG pnpm release patch"
            echo "  git push && git push origin $TAG"
            exit 1
          fi

          TAG_TYPE="$(git cat-file -t "$TAG" 2>/dev/null || true)"
          if [ "$TAG_TYPE" != "tag" ]; then
            echo "Refusing to release $TAG because it is not an annotated tag."
            echo "Create release tags through scripts/version.js or use: git tag -a $TAG -m \"Version ${{ steps.release.outputs.version }}\""
            exit 1
          fi

          TAG_COMMIT="$(git rev-parse "$TAG^{commit}")"

          if ! git merge-base --is-ancestor "$TAG_COMMIT" "$DEFAULT_BRANCH"; then
            echo "::error::Release tag $TAG does not point at a commit contained in $DEFAULT_BRANCH."
            echo "Tag commit: $TAG_COMMIT"
            exit 1
          fi

          PACKAGE_JSON="$(mktemp)"
          git show "$TAG_COMMIT:package.json" > "$PACKAGE_JSON"
          PACKAGE_VERSION="$(
            node -e 'const fs = require("fs"); console.log(JSON.parse(fs.readFileSync(process.argv[1], "utf8")).version)' "$PACKAGE_JSON"
          )"
          rm -f "$PACKAGE_JSON"

          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "::error::Release tag $TAG points at package.json version $PACKAGE_VERSION, expected $VERSION."
            echo "Create a version bump commit and tag through scripts/version.js before publishing."
            exit 1
          fi

          echo "Validated release tag $TAG at $TAG_COMMIT for version $VERSION."

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(github.event.inputs.platform == 'all' && '[{"platform":"mac","os":"macos-latest","build":"npm run build && pnpm exec electron-builder --mac --arm64 --x64 --publish never"},{"platform":"windows","os":"windows-2022","build":"npm run build && pnpm exec electron-builder --win --x64 --arm64 --publish never"},{"platform":"linux","os":"ubuntu-latest","build":"npm run build && pnpm exec electron-builder --linux --x64 --arm64 --publish never"}]' || github.event.inputs.platform == 'mac' && '[{"platform":"mac","os":"macos-latest","build":"npm run build && pnpm exec electron-builder --mac --arm64 --x64 --publish never"}]' || github.event.inputs.platform == 'windows' && '[{"platform":"windows","os":"windows-2022","build":"npm run build && pnpm exec electron-builder --win --x64 --arm64 --publish never"}]' || github.event.inputs.platform == 'linux' && '[{"platform":"linux","os":"ubuntu-latest","build":"npm run build && pnpm exec electron-builder --linux --x64 --arm64 --publish never"}]' || '[]') }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set package version from release tag
        shell: bash
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libevdev-dev libxtst-dev libx11-dev libxfixes-dev libwayland-dev

      - name: Install macOS packaging dependencies
        if: matrix.platform == 'mac'
        run: |
          brew install python-setuptools
          python3 -m pip install --break-system-packages setuptools || python3 -m pip install --user setuptools

      - name: Verify macOS signing secrets
        if: matrix.platform == 'mac'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing macOS signing secrets: %s\n' "${missing[*]}"
            printf 'Grant CherryHQ organization secrets to this repository or add repo-level secrets.\n'
            exit 1
          fi

      - name: Build ${{ matrix.platform }} installers
        shell: bash
        run: ${{ matrix.build }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

          # Optional app build-time secrets.
          MAIN_VITE_CHERRYAI_CLIENT_SECRET: ${{ secrets.MAIN_VITE_CHERRYAI_CLIENT_SECRET }}
          MAIN_VITE_MINERU_API_KEY: ${{ secrets.MAIN_VITE_MINERU_API_KEY }}
          RENDERER_VITE_AIHUBMIX_SECRET: ${{ secrets.RENDERER_VITE_AIHUBMIX_SECRET }}
          RENDERER_VITE_PPIO_APP_SECRET: ${{ secrets.RENDERER_VITE_PPIO_APP_SECRET }}

          # macOS signing and notarization. These names match Cherry Studio's release workflow.
          CSC_FOR_PULL_REQUEST: true
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd dist
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 \
              *.exe *.zip *.dmg *.AppImage *.deb *.rpm *.tar.gz *.yml *.blockmap \
              2>/dev/null > "SHA256SUMS-${{ matrix.platform }}.txt" || true
          else
            sha256sum \
              *.exe *.zip *.dmg *.AppImage *.deb *.rpm *.tar.gz *.yml *.blockmap \
              2>/dev/null > "SHA256SUMS-${{ matrix.platform }}.txt" || true
          fi
          cat "SHA256SUMS-${{ matrix.platform }}.txt"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ needs.prepare.outputs.tag }}-${{ matrix.platform }}
          if-no-files-found: error
          compression-level: 0
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.yml
            dist/*.blockmap
            dist/SHA256SUMS-${{ matrix.platform }}.txt

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-${{ needs.prepare.outputs.tag }}-*
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        shell: bash
        run: find release-artifacts -type f -maxdepth 2 -print | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Cherry Studio Pi ${{ needs.prepare.outputs.tag }}
          draft: ${{ needs.prepare.outputs.draft }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          generate_release_notes: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: release-artifacts/*

      - name: Dispatch app upgrade config sync
        if: needs.prepare.outputs.draft != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          gh workflow run update-app-upgrade-config.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f tag="$RELEASE_TAG" \
            -f is_prerelease="$RELEASE_PRERELEASE"

      - name: Dispatch GitCode mirror sync
        if: needs.prepare.outputs.draft != 'true' && needs.prepare.outputs.prerelease != 'true'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh workflow run sync-to-gitcode.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f tag="$RELEASE_TAG" \
            -f clean=false \
            -f dry_run=false
