name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.9.7"
        required: true
        default: ""
        type: string
      confirm_tag:
        description: "Type the same release tag again to confirm"
        required: true
        default: ""
        type: string
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - mac
          - windows
          - linux
      draft:
        description: "Create or update the GitHub Release as a draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean
      replace_existing:
        description: "Replace an existing GitHub Release for this tag"
        required: true
        default: false
        type: boolean
      allow_close_release:
        description: "Allow publishing a different tag within 2 hours of the last release"
        required: true
        default: false
        type: boolean

permissions:
  actions: write
  contents: write

concurrency:
  # Serialize all app releases for this repository, even when tags differ.
  # This lets the recent-release guard see the previous run before validating
  # the next one, preventing accidental rapid multi-version publishing.
  group: app-release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release metadata
    if: github.repository == 'CherryHQ/cherry-studio-pi' && github.event_name == 'workflow_dispatch'
    # Releases are intentionally manual-only. Pushing a tag must not publish a
    # GitHub Release; this keeps version bumps and public releases as separate,
    # explicit actions. Keep the event guard above even if a future upstream
    # merge reintroduces a tag push trigger.
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      draft: ${{ steps.release.outputs.draft }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      replace_existing: ${{ steps.release.outputs.replace_existing }}
      allow_close_release: ${{ steps.release.outputs.allow_close_release }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          CONFIRM_TAG="${{ github.event.inputs.confirm_tag }}"
          DRAFT="${{ inputs.draft }}"
          PRERELEASE="${{ inputs.prerelease }}"
          REPLACE_EXISTING="${{ inputs.replace_existing }}"
          ALLOW_CLOSE_RELEASE="${{ inputs.allow_close_release }}"

          if [ "$CONFIRM_TAG" != "$TAG" ]; then
            echo "Release tag confirmation mismatch."
            echo "tag=$TAG"
            echo "confirm_tag=$CONFIRM_TAG"
            exit 1
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $TAG"
            echo "Expected a tag like v1.9.7, v1.9.7-rc.1, or v1.9.7-beta.1"
            exit 1
          fi

          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="true"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "replace_existing=$REPLACE_EXISTING" >> "$GITHUB_OUTPUT"
          echo "allow_close_release=$ALLOW_CLOSE_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          REPLACE_EXISTING="${{ steps.release.outputs.replace_existing }}"
          ALLOW_CLOSE_RELEASE="${{ steps.release.outputs.allow_close_release }}"
          DEFAULT_BRANCH_NAME="${{ github.event.repository.default_branch }}"
          DEFAULT_BRANCH="origin/$DEFAULT_BRANCH_NAME"
          CLOSE_RELEASE_WINDOW_MINUTES=120

          git fetch origin --tags --force
          if ! git rev-parse --verify "$DEFAULT_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$DEFAULT_BRANCH_NAME:refs/remotes/origin/$DEFAULT_BRANCH_NAME"
          fi

          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Release tag $TAG does not exist."
            echo "Create it with the guarded version helper first:"
            echo "  CHERRY_STUDIO_PI_RELEASE_CONFIRM=$TAG pnpm release patch"
            echo "Push the version commit first:"
            echo "  git push"
            echo "Push the annotated tag only after confirming this tag should be available remotely:"
            echo "  git push origin $TAG"
            echo "Pushing the tag does not publish installers; it only makes the tag selectable here."
            exit 1
          fi

          TAG_TYPE="$(git cat-file -t "$TAG" 2>/dev/null || true)"
          if [ "$TAG_TYPE" != "tag" ]; then
            echo "Refusing to release $TAG because it is not an annotated tag."
            echo "Create release tags through scripts/version.js or use: git tag -a $TAG -m \"Version ${{ steps.release.outputs.version }}\""
            exit 1
          fi

          TAG_COMMIT="$(git rev-parse "$TAG^{commit}")"

          if ! git merge-base --is-ancestor "$TAG_COMMIT" "$DEFAULT_BRANCH"; then
            echo "::error::Release tag $TAG does not point at a commit contained in $DEFAULT_BRANCH."
            echo "Tag commit: $TAG_COMMIT"
            exit 1
          fi

          PACKAGE_JSON="$(mktemp)"
          git show "$TAG_COMMIT:package.json" > "$PACKAGE_JSON"
          PACKAGE_VERSION="$(
            node -e 'const fs = require("fs"); console.log(JSON.parse(fs.readFileSync(process.argv[1], "utf8")).version)' "$PACKAGE_JSON"
          )"
          rm -f "$PACKAGE_JSON"

          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "::error::Release tag $TAG points at package.json version $PACKAGE_VERSION, expected $VERSION."
            echo "Create a version bump commit and tag through scripts/version.js before publishing."
            exit 1
          fi

          RELEASE_VIEW_ERROR="$(mktemp)"
          RELEASE_VIEW_JSON="$(mktemp)"
          if gh release view "$TAG" --repo "${{ github.repository }}" --json url,assets > "$RELEASE_VIEW_JSON" 2> "$RELEASE_VIEW_ERROR"; then
            EXISTING_URL="$(
              node -e 'const fs = require("fs"); const data = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); console.log(data.url || "")' "$RELEASE_VIEW_JSON"
            )"
            EXISTING_ASSET_COUNT="$(
              node -e 'const fs = require("fs"); const data = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); console.log(Array.isArray(data.assets) ? data.assets.length : 0)' "$RELEASE_VIEW_JSON"
            )"

            if [ "$REPLACE_EXISTING" != "true" ]; then
              echo "::error::GitHub Release $TAG already exists and has $EXISTING_ASSET_COUNT asset(s)."
              echo "Existing release: $EXISTING_URL"
              echo "Refusing to rebuild or overwrite an existing release from a normal one-shot release request."
              echo "Only set replace_existing=true when you intentionally want to replace assets for the same tag."
              exit 1
            fi

            echo "Replacing existing release $TAG with $EXISTING_ASSET_COUNT asset(s): $EXISTING_URL"
          elif grep -Eqi 'not found|could not find|404' "$RELEASE_VIEW_ERROR"; then
            echo "No existing GitHub Release found for $TAG."
          else
            echo "::error::Unable to verify whether GitHub Release $TAG already exists."
            cat "$RELEASE_VIEW_ERROR"
            exit 1
          fi
          rm -f "$RELEASE_VIEW_ERROR" "$RELEASE_VIEW_JSON"

          if [ "$ALLOW_CLOSE_RELEASE" != "true" ]; then
            RECENT_RELEASES_JSON="$(mktemp)"
            if ! gh release list --repo "${{ github.repository }}" --limit 10 --json tagName,name,createdAt,publishedAt,isDraft,isPrerelease > "$RECENT_RELEASES_JSON"; then
              echo "::error::Unable to inspect recent GitHub Releases before publishing."
              rm -f "$RECENT_RELEASES_JSON"
              exit 1
            fi

            node - "$RECENT_RELEASES_JSON" "$TAG" "$CLOSE_RELEASE_WINDOW_MINUTES" <<'NODE'
          const fs = require('node:fs')

          const [file, currentTag, windowMinutesText] = process.argv.slice(2)
          const windowMinutes = Number(windowMinutesText)
          const windowMs = windowMinutes * 60 * 1000
          const releases = JSON.parse(fs.readFileSync(file, 'utf8'))
          const now = Date.now()

          const recent = releases
            .filter((release) => release.tagName !== currentTag)
            .map((release) => ({
              ...release,
              timestamp: Date.parse(release.publishedAt || release.createdAt)
            }))
            .filter((release) => Number.isFinite(release.timestamp))
            .find((release) => now - release.timestamp >= 0 && now - release.timestamp < windowMs)

          if (recent) {
            const releasedAt = new Date(recent.timestamp).toISOString()
            const releaseState = recent.isDraft ? 'draft release' : 'release'
            console.error(`::error::Recent ${releaseState} ${recent.tagName} was created at ${releasedAt}.`)
            console.error(
              `Refusing to publish ${currentTag} within ${windowMinutes} minutes of another release or draft. ` +
                'If this is an intentional urgent hotfix, rerun the workflow with allow_close_release=true.'
            )
            process.exit(1)
          }
          NODE
            rm -f "$RECENT_RELEASES_JSON"
          fi

          echo "Validated release tag $TAG at $TAG_COMMIT for version $VERSION."

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    if: github.repository == 'CherryHQ/cherry-studio-pi' && github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(github.event.inputs.platform == 'all' && '[{"platform":"mac","os":"macos-latest","build":"npm run build && pnpm exec electron-builder --mac --arm64 --x64 --publish never"},{"platform":"windows","os":"windows-2022","build":"npm run build && pnpm exec electron-builder --win --x64 --arm64 --publish never"},{"platform":"linux","os":"ubuntu-latest","build":"npm run build && pnpm exec electron-builder --linux --x64 --arm64 --publish never"}]' || github.event.inputs.platform == 'mac' && '[{"platform":"mac","os":"macos-latest","build":"npm run build && pnpm exec electron-builder --mac --arm64 --x64 --publish never"}]' || github.event.inputs.platform == 'windows' && '[{"platform":"windows","os":"windows-2022","build":"npm run build && pnpm exec electron-builder --win --x64 --arm64 --publish never"}]' || github.event.inputs.platform == 'linux' && '[{"platform":"linux","os":"ubuntu-latest","build":"npm run build && pnpm exec electron-builder --linux --x64 --arm64 --publish never"}]' || '[]') }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set package version from release tag
        shell: bash
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux packaging dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libevdev-dev libxtst-dev libx11-dev libxfixes-dev libwayland-dev

      - name: Install macOS packaging dependencies
        if: matrix.platform == 'mac'
        run: |
          brew install python-setuptools
          python3 -m pip install --break-system-packages setuptools || python3 -m pip install --user setuptools

      - name: Verify macOS signing secrets
        if: matrix.platform == 'mac'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing macOS signing secrets: %s\n' "${missing[*]}"
            printf 'Grant CherryHQ organization secrets to this repository or add repo-level secrets.\n'
            exit 1
          fi

      - name: Build ${{ matrix.platform }} installers
        shell: bash
        run: ${{ matrix.build }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

          # Optional app build-time secrets.
          MAIN_VITE_CHERRYAI_CLIENT_SECRET: ${{ secrets.MAIN_VITE_CHERRYAI_CLIENT_SECRET }}
          MAIN_VITE_MINERU_API_KEY: ${{ secrets.MAIN_VITE_MINERU_API_KEY }}
          RENDERER_VITE_AIHUBMIX_SECRET: ${{ secrets.RENDERER_VITE_AIHUBMIX_SECRET }}
          RENDERER_VITE_PPIO_APP_SECRET: ${{ secrets.RENDERER_VITE_PPIO_APP_SECRET }}

          # macOS signing and notarization. These names match Cherry Studio's release workflow.
          CSC_FOR_PULL_REQUEST: true
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd dist
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 \
              *.exe *.zip *.dmg *.AppImage *.deb *.rpm *.tar.gz *.yml *.blockmap \
              2>/dev/null > "SHA256SUMS-${{ matrix.platform }}.txt" || true
          else
            sha256sum \
              *.exe *.zip *.dmg *.AppImage *.deb *.rpm *.tar.gz *.yml *.blockmap \
              2>/dev/null > "SHA256SUMS-${{ matrix.platform }}.txt" || true
          fi
          cat "SHA256SUMS-${{ matrix.platform }}.txt"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ needs.prepare.outputs.tag }}-${{ matrix.platform }}
          if-no-files-found: error
          compression-level: 0
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.yml
            dist/*.blockmap
            dist/SHA256SUMS-${{ matrix.platform }}.txt

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    if: github.repository == 'CherryHQ/cherry-studio-pi' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-${{ needs.prepare.outputs.tag }}-*
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        shell: bash
        run: find release-artifacts -type f -maxdepth 2 -print | sort

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Cherry Studio Pi ${{ needs.prepare.outputs.tag }}
          draft: ${{ needs.prepare.outputs.draft }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          generate_release_notes: true
          overwrite_files: ${{ needs.prepare.outputs.replace_existing }}
          fail_on_unmatched_files: true
          files: release-artifacts/*

      - name: Dispatch app upgrade config sync
        if: needs.prepare.outputs.draft != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          gh workflow run update-app-upgrade-config.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f tag="$RELEASE_TAG" \
            -f confirm_tag="$RELEASE_TAG" \
            -f is_prerelease="$RELEASE_PRERELEASE"

      - name: Dispatch GitCode mirror sync
        if: needs.prepare.outputs.draft != 'true' && needs.prepare.outputs.prerelease != 'true'
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh workflow run sync-to-gitcode.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f tag="$RELEASE_TAG" \
            -f confirm_tag="$RELEASE_TAG" \
            -f clean=false \
            -f dry_run=false
